<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bearer Token Extractor</title>
		<style>
			body {
				width: 400px;
				padding: 20px;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				margin: 0;
			}
			h1 {
				font-size: 18px;
				margin: 0 0 15px 0;
				color: #333;
			}
			.status {
				padding: 10px;
				border-radius: 5px;
				margin-bottom: 15px;
				background-color: #e8f5e9;
				color: #2e7d32;
				font-size: 14px;
			}
			.token-info {
				background-color: #f5f5f5;
				padding: 10px;
				border-radius: 5px;
				margin-top: 10px;
				font-size: 12px;
				overflow-x: auto;
				white-space: nowrap;
				font-family: "Courier New", monospace;
			}
			.no-token {
				color: #666;
				font-style: italic;
			}
			.timestamp {
				color: #666;
				font-size: 11px;
				margin-top: 5px;
			}
			.info {
				font-size: 12px;
				color: #666;
				margin-top: 15px;
				padding-top: 15px;
				border-top: 1px solid #e0e0e0;
			}
			.settings {
				margin-top: 15px;
				padding-top: 15px;
				border-top: 1px solid #e0e0e0;
			}
			.settings label {
				display: block;
				font-size: 12px;
				color: #333;
				margin-bottom: 5px;
				font-weight: 500;
			}
			.settings input {
				width: 100%;
				padding: 8px;
				border: 1px solid #ddd;
				border-radius: 4px;
				box-sizing: border-box;
				font-size: 12px;
				margin-bottom: 8px;
			}
			.settings-hint {
				color: #999;
				display: block;
				margin-top: -5px;
				margin-bottom: 10px;
				font-size: 11px;
			}
			.copy-btn {
				padding: 4px 12px;
				background-color: #4caf50;
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				font-size: 12px;
			}

			.copy-btn:hover {
				background-color: #45a049;
			}

			.copy-btn.copied {
				background-color: #2196f3;
			}
		</style>
	</head>
	<body>
		<h1>🔐 Bearer Token Extractor</h1>

		<div class="status" id="statusDiv">✓ Extension active</div>

		<div id="lastToken">
			<strong>Last captured token:</strong>
			<div class="token-info no-token">No token captured yet</div>
		</div>

		<div class="settings">
			<label for="urlInput">URL to monitor:</label>
			<input type="text" id="urlInput" placeholder="https://example.com/*" />
			<span class="settings-hint">Use * as wildcard (e.g: https://localhost:8080/*)</span>
		</div>
		<div class="info">Token captured from requests to the configured URL.</div>
		<script src="popup.js"></script>
	</body>
</html>
